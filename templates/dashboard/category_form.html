{% extends 'dashboard/base_dashboard.html' %}
{% block page_title %}إضافة تصنيف جديد{% endblock %}

{% block dashboard_content %}
<!-- حاوية النموذج مع تحديد العرض والهوامش -->
<div class="table-container" style="max-width: 600px; margin: 0 auto;">
    <h3 style="margin-bottom: 20px; color: #2c3e50;">بيانات التصنيف</h3>

    <!-- عرض رسائل النظام (مثل الأخطاء أو النجاح) -->
    {% if messages %}
    {% for message in messages %}
    <div class="alert-error" style="background: #fdedec; color: #e74c3c; margin-bottom: 20px;">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <!-- نموذج إضافة/تعديل التصنيف -->
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- حقل اسم التصنيف -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; color: #34495e;">اسم التصنيف</label>
            <input type="text" name="name" required
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem;"
                placeholder="مثال: حلويات">
        </div>

        <!-- حقل أيقونة التصنيف -->
        <div style="margin-bottom: 30px;">
            <label style="display: block; margin-bottom: 10px; color: #34495e;">الأيقونة (اختياري)</label>
            <input type="file" name="icon" accept="image/*"
                style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        </div>

        <!-- أزرار الحفظ والإلغاء -->
        <div style="display: flex; gap: 10px;">
            <button type="submit"
                style="background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 1rem;">
                <i class="fas fa-save"></i> حفظ
            </button>
            <a href="{% url 'dashboard:category_list' %}"
                style="background: #95a5a6; color: white; text-decoration: none; padding: 12px 30px; border-radius: 5px; display: inline-block;">
                إلغاء
            </a>
        </div>
    </form>
</div>
{% endblock %}
